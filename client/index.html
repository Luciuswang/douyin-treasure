<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#00d4aa" />
  <meta name="description" content="Totofun 突突翻 - 基于GPS的实时寻宝游戏" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Totofun" />
  <link rel="icon" type="image/png" href="/totofun-logo.png" />
  <link rel="apple-touch-icon" href="/totofun-logo.png" />
  <link rel="manifest" href="/manifest.json" />
  <title>Totofun 突突翻</title>
  <style>
    #splash-screen {
      position: fixed; inset: 0; z-index: 99999;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: linear-gradient(145deg, #0a2342 0%, #134e5e 40%, #00d4aa 100%);
      transition: opacity .6s ease, visibility .6s ease;
    }
    #splash-screen.hide { opacity: 0; visibility: hidden; pointer-events: none; }
    .splash-logo {
      width: 120px; height: 120px; border-radius: 28px;
      box-shadow: 0 8px 40px rgba(0,212,170,.4), 0 0 80px rgba(0,212,170,.15);
      animation: splash-pop .8s cubic-bezier(.34,1.56,.64,1) both, splash-float 3s ease-in-out infinite .8s;
    }
    .splash-title {
      margin-top: 24px; font-size: 32px; font-weight: 800;
      background: linear-gradient(90deg, #fff 0%, #7effd4 50%, #fff 100%);
      background-size: 200% 100%;
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; color: transparent;
      animation: splash-shimmer 2.5s ease infinite;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
    }
    .splash-tagline {
      margin-top: 8px; font-size: 14px; color: rgba(255,255,255,.6);
      letter-spacing: 2px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
    }
    .splash-dots {
      display: flex; gap: 8px; margin-top: 48px;
    }
    .splash-dots span {
      width: 8px; height: 8px; border-radius: 50%;
      background: rgba(255,255,255,.8);
      animation: splash-bounce 1.4s ease-in-out infinite;
    }
    .splash-dots span:nth-child(2) { animation-delay: .16s; }
    .splash-dots span:nth-child(3) { animation-delay: .32s; }
    .splash-radar {
      position: absolute; bottom: 15%; left: 50%; transform: translateX(-50%);
      width: 200px; height: 200px; opacity: .12;
    }
    .splash-radar circle {
      fill: none; stroke: #7effd4; stroke-width: 1;
      animation: splash-radar-expand 2.5s ease-out infinite;
    }
    .splash-radar circle:nth-child(2) { animation-delay: .8s; }
    .splash-radar circle:nth-child(3) { animation-delay: 1.6s; }
    @keyframes splash-pop {
      0% { opacity: 0; transform: scale(.3) rotate(-15deg); }
      100% { opacity: 1; transform: scale(1) rotate(0); }
    }
    @keyframes splash-float {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    @keyframes splash-shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    @keyframes splash-bounce {
      0%,80%,100% { transform: scale(0); opacity: .4; }
      40% { transform: scale(1); opacity: 1; }
    }
    @keyframes splash-radar-expand {
      0% { r: 5; opacity: 1; }
      100% { r: 100; opacity: 0; }
    }
  </style>
</head>
<body>
  <!-- Loading Splash -->
  <div id="splash-screen">
    <img class="splash-logo" src="/totofun-logo.png" alt="Totofun" />
    <div class="splash-title">突突翻</div>
    <div class="splash-tagline">探索真实世界的宝藏</div>
    <div class="splash-dots"><span></span><span></span><span></span></div>
    <svg class="splash-radar" viewBox="0 0 200 200">
      <circle cx="100" cy="100" r="5" /><circle cx="100" cy="100" r="5" /><circle cx="100" cy="100" r="5" />
    </svg>
  </div>

  <div id="app"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
